<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taqsak - موقع الطقس</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sky">
        <div class="stars"></div>
        <div class="moon"></div>
        <div class="cloud cloud-one"></div>
        <div class="cloud cloud-two"></div>
    </div>

    <div class="container">
        <div class="flag-wave" aria-hidden="true">
            <div class="flag"></div>
        </div>
        <img src="icon.png" width="100" style="border-radius:20px;">
        <h1>🌤️ Wetter-App</h1>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Stadt eingeben... z. B. Berlin">
            <button id="searchBtn">Suchen</button>
            <button id="locationBtn">📍 Mein Standort</button>
        </div>

        <div id="loader" class="hidden">Wird geladen...</div>

        <div id="weatherResult" class="hidden">
            <h2 id="cityName"></h2>
            <div class="current-temp">
                <span id="temp"></span>
                <span id="weatherIcon"></span>
            </div>
            <p id="description"></p>
            <div class="details">
                <span>💧 Luftfeuchtigkeit: <b id="humidity"></b>%</span>
                <span>💨 Wind: <b id="wind"></b> km/h</span>
            </div>
            <div id="forecast" class="forecast"></div>
        </div>
        <p id="error" class="error"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
